name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pypdf

      - name: Run all tests
        run: |
          python tests/test_normalize.py
          python tests/test_analyzers.py
          python tests/test_continuation_local.py
          python tests/test_fusion.py
          python tests/test_pipeline.py
          python tests/test_lexicon.py
          python tests/test_windowed.py
          python tests/test_calibration.py

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: llm-detector-linux
            ext: ""
          - os: macos-latest
            artifact: llm-detector-macos
            ext: ""
          - os: windows-latest
            artifact: llm-detector-windows
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[bundle]"

      - name: Build single-file executable
        run: pyinstaller llm_detector.spec --noconfirm --clean
        env:
          ONEFILE: "1"

      - name: Verify executable exists (Unix)
        if: runner.os != 'Windows'
        run: |
          test -f dist/llm-detector || { echo "Build failed"; exit 1; }
          file dist/llm-detector

      - name: Verify executable exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path dist/llm-detector.exe)) { Write-Error "Build failed"; exit 1 }
          Get-Item dist/llm-detector.exe

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/llm-detector

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/llm-detector.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Rename artifacts for release
        run: |
          mv llm-detector-linux/llm-detector  llm-detector-linux-x86_64    2>/dev/null || mv llm-detector llm-detector-linux-x86_64
          mv llm-detector-macos/llm-detector  llm-detector-macos-x86_64    2>/dev/null || true
          mv llm-detector-windows/llm-detector.exe llm-detector-windows-x86_64.exe 2>/dev/null || true
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            llm-detector-linux-x86_64
            llm-detector-macos-x86_64
            llm-detector-windows-x86_64.exe
          generate_release_notes: true
