name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish as a GitHub Release (leave blank to only build artifacts)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pypdf pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=llm_detector --cov-report=term-missing --cov-report=json --cov-fail-under=60 -v

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.json
            .coverage

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: llm-detector-linux-x86_64
            binary: llm-detector
          - os: macos-13
            artifact: llm-detector-macos-x86_64
            binary: llm-detector
          - os: macos-latest
            artifact: llm-detector-macos-arm64
            binary: llm-detector
          - os: windows-latest
            artifact: llm-detector-windows-x86_64
            binary: llm-detector.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[bundle]"

      - name: Build single-file executable
        run: pyinstaller llm_detector.spec --noconfirm --clean
        env:
          ONEFILE: "1"

      - name: Verify executable exists (Unix)
        if: runner.os != 'Windows'
        run: |
          test -f dist/llm-detector || { echo "Build failed"; exit 1; }
          file dist/llm-detector

      - name: Verify executable exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path dist/llm-detector.exe)) { Write-Error "Build failed"; exit 1 }
          Get-Item dist/llm-detector.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-detector-linux-x86_64
          path: linux/

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-detector-macos-x86_64
          path: macos-x86_64/

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-detector-macos-arm64
          path: macos-arm64/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-detector-windows-x86_64
          path: windows/

      - name: Prepare release assets
        run: |
          cp linux/llm-detector        llm-detector-linux-x86_64
          cp macos-x86_64/llm-detector llm-detector-macos-x86_64
          cp macos-arm64/llm-detector  llm-detector-macos-arm64
          cp windows/llm-detector.exe  llm-detector-windows-x86_64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            llm-detector-linux-x86_64
            llm-detector-macos-x86_64
            llm-detector-macos-arm64
            llm-detector-windows-x86_64.exe
          generate_release_notes: true
